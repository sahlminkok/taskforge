{% extends "tasks/main.html" %}

{% block main %}
  <section class="delete-confirmation">
    <h2>Delete Task: "{{ task.title }}"?</h2>
    <p>Are you sure you want to delete this task? This action cannot be undone.</p>

    <form action="{% url 'tasks:delete_task' task.id %}" method="POST">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'tasks:detail' task.id %}" class="btn btn-secondary">No, Go Back</a>
    </form>
  </section>
{% endblock main %}
