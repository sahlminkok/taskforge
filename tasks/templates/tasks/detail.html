{% extends "tasks/main.html" %}

{% block main %}
<section class="detail">
  <h1>{{ task.title }}</h1>
  <p>Priority: {{ task.priority }}</p>
  <p>Status: {{ task.status }}</p>
  <p>Due Date: {{ task.due_date }}</p>
  <p>{{ task.description  }}</p>

  <div>
    <a href="{% url 'update_task' task.id %}" class="btn btn-primary">Edit Task</a>
    <a href="{% url 'delete_task' task.id %}" class="btn btn-danger">Delete Task</a>
  </div>
  <a href="{% url 'index' %}" class="btn btn-info">Back to List</a>
</section>
{% endblock main %}
